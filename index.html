<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>MyContractor WEST COAST Request Form</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="site-header">
      <div class="header-inner">
        <div class="logo">🌱 MyContractor WEST COAST</div>

        <nav class="nav">
          <a href="#">Home</a>
          <a href="#">How It Works</a>
          <a href="#">Sign In</a>
          <button class="join-btn">Contractors Join</button>
        </nav>
      </div>
    </header>

    <main class="page-container">
      <h1>Find trusted local pros for your project.</h1>

      <div class="layout">
        <section class="form-card">
          <h2>Request Free Estimates</h2>
          <p>Send your project details to selected contractors.</p>

          <hr /> <!-- This is a horizontal line to separate sections -->

          <div class="form-section">
            <h3>Service Requested</h3>
            <p class="service-tag">Build my new home</p>
          </div>

          <div class="form-section">
            <h3>Project Details</h3>

            <label>Street Address</label>
            <input type="text" placeholder="123 Main St" />

            <div class="row">
              <div>
                <label>City</label>
                <input type="text" />
              </div>

              <div>
                <label>State</label>
                <input type="text" />
              </div>

              <div>
                <label>Zip Code</label>
                <input type="text" />
              </div>
            </div>

            <label class="checkbox">
              <input type="checkbox" /> This is a rental property
            </label>
          </div>
        </section>

        <aside class="contractor-card">
          <h2>Selected Contractors</h2>
          <p>Choose up to 3 contractors</p>
        </aside>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
